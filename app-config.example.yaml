app:
  extensions:
    - page:home:
        config:
          path: /

    - api:home/visits: true
    - app-root-element:home/visit-listener: true
    # Hide Settings from sidebar
    - nav-item:settings: false
    # Hide Tech Radar from sidebar
    - nav-item:tech-radar: false
    # Hide Visualizer from sidebar
    - nav-item:app-visualizer: false
    - page:app-visualizer: false
    # Hide Notifications from sidebar
    - page:notifications: false

auth:
  # see https://backstage.io/docs/auth/ to learn about auth providers
  environment: development
  providers:
    # See https://backstage.io/docs/auth/guest/provider
    guest: {}
    github:
      development:
        clientId:
        clientSecret:
        signIn:
          resolvers:
            - resolver: usernameMatchingUserEntityName

integrations:
  github:
    - host: github.com
      token:

ragChat:
  defaultModelId: gpt-4
  defaultSourceIds:
    - catalog
    - techdocs
  models:
    - id: gpt-4
      name: GPT-4
      provider: openai
      apiBaseUrl: https://api.openai.com/v1
      # apiToken: ${OPENAI_API_TOKEN}
    - id: claude-3-opus
      name: Claude 3 Opus
      provider: anthropic
      apiBaseUrl: https://api.anthropic.com/v1
      # apiToken: ${ANTHROPIC_API_TOKEN}
    - id: gemini-pro
      name: Gemini Pro
      provider: google
      apiBaseUrl: https://generativelanguage.googleapis.com/v1
      # apiToken: ${GOOGLE_API_TOKEN}
  sources:
    - id: catalog
      name: Software Catalog
      type: catalog
      description: Query entities from the Backstage software catalog
    - id: techdocs
      name: TechDocs
      type: techdocs
      description: Query documentation from TechDocs

techdocs:
  builder: 'local'
  publisher:
    type: 'local'
  generator:
    runIn: local
